name: Publish Staging Docker Image

on:
  push:
    branches: ["main", "frontend-docker-proxy"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish staging image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Docker Hub repository
        id: image
        run: |
          repository="${{ vars.DOCKERHUB_FRONTEND_REPOSITORY }}"
          if [ -z "$repository" ]; then
            echo "Missing GitHub repository variable: DOCKERHUB_FRONTEND_REPOSITORY" >&2
            exit 1
          fi
          echo "repository=$repository" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.repository }}
          flavor: latest=false
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-,format=short

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Redeploy Railway frontend service
    runs-on: ubuntu-latest
    needs: publish
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_FRONTEND_SERVICE: ${{ vars.RAILWAY_FRONTEND_SERVICE }}
    steps:
      - name: Validate Railway deployment settings
        run: |
          missing=0
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "Missing GitHub repository secret: RAILWAY_TOKEN" >&2
            missing=1
          fi
          if [ -z "$RAILWAY_FRONTEND_SERVICE" ]; then
            echo "Missing GitHub repository variable: RAILWAY_FRONTEND_SERVICE" >&2
            missing=1
          fi
          exit "$missing"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Redeploy frontend from staging image
        run: railway redeploy --service "$RAILWAY_FRONTEND_SERVICE" --yes
