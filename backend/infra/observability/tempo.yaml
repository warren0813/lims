# Minimal single-binary Tempo config for local tracing.
# Receives OTLP from the Django backend (OTEL_EXPORTER_OTLP_ENDPOINT=tempo:4317)
# and stores traces on a local volume. Not for production — Railway runs its
# own Tempo service.
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
