:root {
  /* ── BRAND / PRIMARY ──────────────────────────── */
  --primary:        #1e1e24;   /* near-black ink, primary buttons + sidebar */
  --primary-hover:  #2d2d38;
  --primary-light:  #ebebf0;
  --primary-dark:   #0e0e14;

  /* Shared accents — "lab night sky" — used for BOTH lab_member and fab_user */
  --accent-lavender:#bbb7e8;   /* soft lavender — running/active */
  --accent-pink:    #f4a8bf;   /* dusty pink — logo gradient + ambient orbs */
  --accent-teal:    #9ebbc8;   /* dusty teal — receive accents */
  --accent-link:    #6c67b8;   /* lavender-violet — links, in-progress, activity */
  --running:        #6c67b8;   /* live/running accent */

  /* ── BACKGROUND SURFACES ──────────────────────── */
  --bg-app:         #f7f8fa;
  --bg-card:        #ffffff;
  --bg-sidebar:     #1e1e24;   /* SAME for both roles now */
  --bg-sidebar-hover: rgba(255,255,255,0.05);
  --bg-sidebar-active:rgba(187,183,232,0.18);
  --bg-row-hover:   #fafafd;
  --bg-subtle:      #f8fafc;
  --bg-login-dark:  linear-gradient(160deg, #1e1e24 0%, #2d2d38 60%, #14141a 100%);

  /* ── BORDERS ──────────────────────────────────── */
  --border:         rgba(0,0,0,0.09);
  --border-strong:  rgba(0,0,0,0.16);

  /* ── FOREGROUND / TEXT ────────────────────────── */
  --fg1:            #1a1a1a;
  --fg2:            #666666;
  --fg3:            #999999;
  --fg-sidebar:     #888899;
  --fg-sidebar-active:#ffffff;

  --text-primary:   var(--fg1);
  --text-secondary: var(--fg2);
  --text-muted:     var(--fg3);

  /* Neutral ramp (still useful for muted slates in copy/metadata) */
  --neutral-900:    #1e1e24;
  --neutral-700:    #3a3a44;
  --neutral-600:    #5a5a6e;
  --neutral-500:    #777788;
  --neutral-400:    #a8a8b8;
  --neutral-300:    #cbcbd6;
  --neutral-200:    #e2e2ea;
  --neutral-100:    #f1f1f5;
  --neutral-50:     #f8f8fb;

  /* ── STATUS COLORS (paired bg/text tokens) ────── */
  --status-progress-bg:  #d4eaf0; --status-progress-text:  #2a7a91;
  --status-pending-bg:   #fef0d4; --status-pending-text:   #b8720e;
  --status-received-bg:  #e8e7f6; --status-received-text:  #5550a0;
  --status-completed-bg: #c8eedd; --status-completed-text: #157a4a;
  --status-shipped-bg:   #d4eaf0; --status-shipped-text:   #2a7a91;
  --status-created-bg:   #ebebf0; --status-created-text:   #777788;
  --status-rejected-bg:  #fde4e4; --status-rejected-text:  #c0394a;
  --status-aborted-bg:   #fde4e4; --status-aborted-text:   #c0394a;
  --status-pass-bg:      #c8eedd; --status-pass-text:      #157a4a;
  --status-fail-bg:      #fde4e4; --status-fail-text:      #c0394a;

  /* equipment state — running uses lavender-violet, not blue */
  --eq-idle:    #a8a8b8;
  --eq-running: #6c67b8;
  --eq-maint:   #f59e0b;
  --eq-error:   #ef4444;

  /* ── TYPE FAMILIES ────────────────────────────── */
  --font-display: 'Space Grotesk', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-body:    'Space Grotesk', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono:    'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;

  /* ── RADII ────────────────────────────────────── */
  --radius-sm:   4px;
  --radius-md:   8px;
  --radius-lg:   12px;
  --radius-xl:   16px;
  --radius-full: 999px;

  /* ── ELEVATION ────────────────────────────────── */
  --shadow-xs:  0 1px 2px rgba(30,30,36,0.04);
  --shadow-sm:  0 1px 2px rgba(0,0,0,0.06);
  --shadow-md:  0 4px 18px rgba(244,168,191,0.40);   /* logo glow — pink */
  --shadow-md-lavender: 0 4px 18px rgba(187,183,232,0.40); /* logo glow — lavender */
  --shadow-lg:  0 12px 36px rgba(30,30,36,0.32);     /* toast, modal */
  --shadow-btn-primary: 0 1px 2px rgba(108,103,184,0.30);

  /* ── LAYOUT TOKENS ────────────────────────────── */
  --sidebar-width: 220px;
  --row-height:    52px;
  --content-max:   1280px;
  --content-pad-x: 32px;
  --content-pad-x-fab: 44px;
}

/* ── BASE TYPE ──────────────────────────────────── */
html, body { height: 100%; }
body {
  font-family: var(--font-body);
  background: var(--bg-app);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── SEMANTIC TYPE ROLES ───────────────────────── */
.t-page-title    { font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.2; color: var(--text-primary); }
.t-fab-title     { font-family: var(--font-display); font-size: 28px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; color: var(--neutral-900); }
.t-hero          { font-family: var(--font-display); font-size: 56px; font-weight: 700; letter-spacing: -0.025em; line-height: 1.05; }
.t-card-title    { font-size: 15.5px; font-weight: 600; color: var(--text-primary); }
.t-stat-value    { font-family: var(--font-display); font-size: 30px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; color: var(--text-primary); }
.t-section-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.08em; text-transform: uppercase; }
.t-body          { font-size: 14px; line-height: 1.5; color: var(--text-primary); }
.t-body-sm       { font-size: 13px; line-height: 1.5; color: var(--text-primary); }
.t-subtitle      { font-size: 12.5px; color: var(--text-muted); }
.t-mono          { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.01em; }
.mono            { font-family: var(--font-mono); }

h1 { font-family: var(--font-display); font-size: 28px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; }
h2 { font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.25; }
h3 { font-family: var(--font-display); font-size: 16px; font-weight: 700; line-height: 1.3; }
p  { font-size: 14px; line-height: 1.5; }
code, kbd, samp { font-family: var(--font-mono); font-size: 0.92em; }

button, input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }
button { cursor: pointer; border: 0; background: transparent; }
a { color: inherit; text-decoration: none; }

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;
const SESSION_KEY = 'lims.session.v1';

// Theme-color tweak presets — all from the lavender / pink "lab night sky" palette.
const SIGNIN_OPTIONS = [
  '#6c67b8',   // accent-link · violet (default)
  '#1e1e24',   // primary ink
  '#f4a8bf',   // dusty pink
  '#bbb7e8',   // soft lavender
];
const FAB_OPTIONS = [
  'linear-gradient(135deg, #f4a8bf, #bbb7e8)',  // pink → lavender (default)
  'linear-gradient(135deg, #bbb7e8, #6c67b8)',  // lavender → violet
  'linear-gradient(135deg, #f4a8bf, #6c67b8)',  // pink → violet
  '#1e1e24',                                    // ink
];

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "signInBg": "#1e1e24",
  "signInFg": "#ffffff",
  "fabBg": "linear-gradient(135deg, #f4a8bf, #6c67b8)"
}/*EDITMODE-END*/;

const App = () => {
  const [user, setUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem(SESSION_KEY) || 'null'); }
    catch { return null; }
  });

  const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

  // Push tweak values to CSS custom properties so the components read them.
  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--tweak-signin-bg', t.signInBg);
    root.style.setProperty('--tweak-signin-fg', t.signInFg);
    root.style.setProperty('--tweak-fab-bg',    t.fabBg);
  }, [t.signInBg, t.signInFg, t.fabBg]);

  useEffect(() => {
    if (user) localStorage.setItem(SESSION_KEY, JSON.stringify(user));
    else      localStorage.removeItem(SESSION_KEY);
  }, [user]);

  const onLogin  = (u) => setUser(u);
  const onLogout = () => setUser(null);

  const {
    TweaksPanel, TweakSection, TweakColor, TweakButton,
  } = window;

  // Custom swatch grid for fab gradient options (TweakColor expects single colors;
  // gradients render as a square preview here).
  const FabGradient = () => (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 6, padding: '6px 10px 10px' }}>
      <div style={{ fontSize: 11, color: '#5a5a6e', fontWeight: 600, letterSpacing: '0.04em', textTransform: 'uppercase' }}>fab_user icon</div>
      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
        {FAB_OPTIONS.map(g => {
          const active = t.fabBg === g;
          return (
            <button key={g} type="button" onClick={() => setTweak('fabBg', g)} title={g} style={{
              width: 36, height: 36, borderRadius: 8, padding: 0,
              background: g, cursor: 'pointer',
              border: active ? '2px solid #1e1e24' : '1px solid rgba(0,0,0,0.15)',
              boxShadow: active ? '0 0 0 2px rgba(108,103,184,0.25)' : 'none',
            }}/>
          );
        })}
      </div>
    </div>
  );

  const tweaksUI = (
    <TweaksPanel>
      <TweakSection label="Sign in button"/>
      <TweakColor
        label="Background"
        value={t.signInBg}
        options={SIGNIN_OPTIONS}
        onChange={(v) => setTweak('signInBg', v)}
      />
      <TweakColor
        label="Text"
        value={t.signInFg}
        options={['#ffffff', '#1e1e24', '#f7f8fa']}
        onChange={(v) => setTweak('signInFg', v)}
      />
      <TweakSection label="fab_user icon"/>
      <FabGradient/>
      <TweakButton onClick={() => {
        setTweak({ signInBg: TWEAK_DEFAULTS.signInBg, signInFg: TWEAK_DEFAULTS.signInFg, fabBg: TWEAK_DEFAULTS.fabBg });
      }}>Reset to theme defaults</TweakButton>
    </TweaksPanel>
  );

  if (!user) {
    return (
      <div data-screen-label="Login">
        <window.LoginPage onLogin={onLogin}/>
        {tweaksUI}
      </div>
    );
  }

  if (user.role === 'fab_user') {
    return <FabRoot user={user} onLogout={onLogout} tweaksUI={tweaksUI}/>;
  }

  if (user.role === 'lab_manager') {
    return <ManagerRoot user={user} onLogout={onLogout} tweaksUI={tweaksUI}/>;
  }

  if (user.role === 'lab_mem' || user.role === 'lab_member') {
    return <LabRoot user={user} onLogout={onLogout} tweaksUI={tweaksUI}/>;
  }

  return (
    <div data-screen-label={`App · ${user.role}`}>
      <window.PostLogin user={user} onLogout={onLogout}/>
      {tweaksUI}
    </div>
  );
};

// Lab member shell — sidebar + LabApp pages.
const LabRoot = ({ user, onLogout, tweaksUI }) => {
  const [route, setRoute] = useState({ page: 'lab_dashboard' });
  const navigate = (r) => setRoute(r);
  const { Sidebar, NAV_ITEMS } = window.SHELL;
  // Map sidebar ids (dashboard / samples / wip / dispatches / equipment) into lab_* routes
  const LAB_NAV_ITEMS = NAV_ITEMS.map(n => ({ ...n, id: 'lab_' + n.id }));
  return (
    <div className="app" data-screen-label={`App · lab_mem · ${route.page}`}>
      <Sidebar
        route={route}
        navigate={navigate}
        navItems={LAB_NAV_ITEMS}
        sectionLabel="Lab Operations"
        sublabel="Lab Member"
        user={user}
        onLogout={onLogout}
      />
      <main className="main">
        <window.LabApp route={route} navigate={navigate}/>
      </main>
      {tweaksUI}
    </div>
  );
};

// Fab user shell — sidebar + FabApp pages.
const FabRoot = ({ user, onLogout, tweaksUI }) => {
  const [route, setRoute] = useState({ page: 'fab_dashboard' });
  const navigate = (r) => setRoute(r);
  const { Sidebar, FAB_NAV_ITEMS } = window.SHELL;
  // Map sidebar nav clicks (which use FAB_NAV_ITEMS ids) into route objects
  const navFromSidebar = (r) => {
    if (r.page === 'fab_requests') setRoute({ page: 'fab_requests', tab: 'all' });
    else setRoute(r);
  };
  return (
    <div className="app" data-screen-label={`App · fab_user · ${route.page}`}>
      <Sidebar
        route={route}
        navigate={navFromSidebar}
        navItems={FAB_NAV_ITEMS}
        sectionLabel="Requests"
        user={user}
        onLogout={onLogout}
      />
      <main className="main">
        <window.FabApp route={route} navigate={navigate}/>
      </main>
      {tweaksUI}
    </div>
  );
};

// Lab manager shell — lab pages + management pages, two-section sidebar.
// lab_* routes go to LabApp, mgr_* routes go to MgrApp.
const ManagerRoot = ({ user, onLogout, tweaksUI }) => {
  const [route, setRoute] = useState({ page: 'mgr_dashboard' });
  const navigate = (r) => setRoute(r);
  const { Sidebar, NAV_ITEMS } = window.SHELL;
  // Lab pages are prefixed lab_*. The manager's Dashboard, however, lives in
  // MgrApp (its own metrics), so swap the Dashboard nav id to mgr_dashboard.
  const LAB_NAV = NAV_ITEMS.map(n => n.id === 'dashboard'
    ? { ...n, id: 'mgr_dashboard' }
    : { ...n, id: 'lab_' + n.id });
  const MGR_NAV = [
    { id: 'mgr_all_requests', label: 'All Requests', cn: '全部申請', icon: 'ClipboardList' },
    { id: 'mgr_recipes',      label: 'Recipes',      cn: '食譜',     icon: 'Layers' },
    { id: 'mgr_reports',      label: 'Reports',      cn: '報表',     icon: 'TrendUp' },
  ];
  const navSections = [
    { label: 'Lab Operations', items: LAB_NAV },
    { label: 'Management',     items: MGR_NAV },
  ];
  // mgr_* routes hit MgrApp (incl. mgr_dashboard); lab_* routes hit LabApp.
  const isMgr = route.page && route.page.startsWith('mgr_');
  return (
    <div className="app" data-screen-label={`App · lab_manager · ${route.page}`}>
      <Sidebar
        route={route}
        navigate={navigate}
        navSections={navSections}
        user={user}
        onLogout={onLogout}
      />
      <main className="main">
        {isMgr
          ? <window.MgrApp route={route} navigate={navigate}/>
          : <window.LabApp route={route} navigate={navigate} canManage={true}/>}
      </main>
      {tweaksUI}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>


</body></html>
