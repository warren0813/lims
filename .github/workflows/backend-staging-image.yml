name: Publish Backend Staging Docker Image

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-staging-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and publish backend staging image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          flavor: latest=false
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-,format=short

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Redeploy Railway backend service
    runs-on: ubuntu-latest
    needs: publish
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_BACKEND_SERVICE: ${{ vars.RAILWAY_BACKEND_SERVICE }}
    steps:
      - name: Validate Railway deployment settings
        run: |
          missing=0
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "Missing GitHub repository secret: RAILWAY_TOKEN" >&2
            missing=1
          fi
          if [ -z "$RAILWAY_BACKEND_SERVICE" ]; then
            echo "Missing GitHub repository variable: RAILWAY_BACKEND_SERVICE" >&2
            missing=1
          fi
          exit "$missing"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Redeploy backend from staging image
        run: railway redeploy --service "$RAILWAY_BACKEND_SERVICE" --yes
