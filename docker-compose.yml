name: lims

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lims
      POSTGRES_USER: lims
      POSTGRES_PASSWORD: lims
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lims -d lims"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DEBUG: "True"
      DJANGO_SECRET_KEY: "dev-compose-secret-change-me-please-rotate"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend,backend:8000,${SERVER_IP}"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://${SERVER_IP}:${FRONTEND_PORT}"
      DATABASE_URL: "postgres://lims:lims@postgres:5432/lims"
      CELERY_TASK_ALWAYS_EAGER: "True"
      RUN_MIGRATIONS: "${RUN_MIGRATIONS:-1}"
      RUN_DEMO_SEEDS: "${RUN_DEMO_SEEDS:-1}"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${SERVER_IP}:${BACKEND_PORT}:8000"
    volumes:
      - backend-media:/app/media

  frontend:
    build:
      context: ./frontend
    environment:
      NODE_ENV: production
      LIMS_BACKEND_URL: "http://backend:8000"
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${SERVER_IP}:${FRONTEND_PORT}:3000"

volumes:
  postgres-data:
  backend-media:
